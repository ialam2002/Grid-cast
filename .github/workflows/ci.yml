name: ci

on:
  pull_request:
  push:
    branches: [master, main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: pytest -q

  dag-import-check:
    runs-on: ubuntu-latest
    needs: python-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run DAG import smoke check
        run: python scripts/check_dag_imports.py

  terraform-validate-plan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev, stage, prod]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5
      - name: Terraform fmt check
        run: terraform -chdir=infra/terraform fmt -recursive -check
      - name: Terraform init
        run: terraform -chdir=infra/terraform/env/${{ matrix.env }} init -backend=false
      - name: Terraform validate
        run: terraform -chdir=infra/terraform/env/${{ matrix.env }} validate
      - name: Terraform plan
        run: terraform -chdir=infra/terraform/env/${{ matrix.env }} plan -input=false -lock=false -refresh=false -no-color

  athena-ddl-generation:
    runs-on: ubuntu-latest
    needs: python-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Generate Athena DDL
        env:
          PYTHONPATH: src
        run: python -m gridcast.catalog.generate_athena_ddl --schema-dir schemas --output-dir infra/athena/ddl --s3-root s3://gridcast-ci-lakehouse
      - name: Ensure DDL files exist
        run: test -n "$(ls -A infra/athena/ddl/*.sql)"

