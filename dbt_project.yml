name: gridcast_dbt
version: 1.0.0
config-version: 2

profile: gridcast_dbt

model-paths: ["dbt/models"]
seed-paths: ["dbt/seeds"]
macro-paths: ["dbt/macros"]
test-paths: ["dbt/tests"]

# Per-environment source schema variables (override with --vars '{"env": "prod"}').
vars:
  bronze_schema: bronze
  silver_schema: silver
  gold_schema: gold

models:
  gridcast_dbt:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: gold

